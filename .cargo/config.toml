# .cargo/config.toml — Cargo Build Configuration
#
# WARNING: This sets the DEFAULT target for the whole workspace.
# The kernel (indo-kernel) uses this default (x86_64-unknown-none).
# The bootloader (indo-boot) OVERRIDES this in indo-boot/.cargo/config.toml
# to use x86_64-unknown-uefi. If you run `cargo build -p indo-boot` without
# the override, you get a raw ELF binary instead of a UEFI PE32+ application,
# and the bootloader will fail silently at boot. ALWAYS use build.ps1.

[target.x86_64-unknown-uefi]
rustflags = [
    "-C", "target-feature=-mmx,-sse,-sse2,-sse3,-ssse3,-sse4.1,-sse4.2,-avx,-avx2",
]

[build]
target = "x86_64-unknown-none"

[target.x86_64-unknown-none]
rustflags = [
    "-C", "link-arg=-Tkernel.ld",
    "-C", "target-feature=-mmx,-sse,-sse2,-sse3,-ssse3,-sse4.1,-sse4.2,-avx,-avx2",
    "-C", "target-feature=+soft-float",
    "-C", "relocation-model=pic",
    "-C", "linker-flavor=ld.lld",
    "-C", "linker=rust-lld",
]

[unstable]
build-std = ["core", "alloc"]
build-std-features = ["compiler-builtins-mem"]
